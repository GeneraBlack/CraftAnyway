name: Build and Publish to CurseForge

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Extract Mod Version
        id: get_version
        run: |
          VERSION=$(grep 'mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' \r\n')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish to CurseForge
        uses: KirqyMC/publish-mod-action@v2
        with:
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          
          name: "CraftAnyway v${{ steps.get_version.outputs.version }}"
          version: "${{ steps.get_version.outputs.version }}"
          changelog-file: curseforge_description.md
          
          files: |
            build/libs/craftanyway-${{ steps.get_version.outputs.version }}.jar

          loaders: |
            neoforge
          game-versions: |
            1.21.1
