tasks.register('dumpEventHandler') {
    doLast {
        def cl = sourceSets.main.compileClasspath
        def ucl = new URLClassLoader(cl.collect { it.toURI().toURL() } as URL[], (ClassLoader) null)
        try {
            def clazz = ucl.loadClass('net.minecraft.client.gui.components.events.GuiEventListener')
            println '--- GuiEventListener Methods ---'
            clazz.getDeclaredMethods().each { m -> println m.name + ' : ' + m.getParameterTypes().collect { it.name } }
        } catch (Exception e) {
            e.printStackTrace()
        }
    }
}
tasks.register('findClasses') {
    doLast {
        def cl = sourceSets.main.compileClasspath
        def ucl = new URLClassLoader(cl.collect { it.toURI().toURL() } as URL[], (ClassLoader) null)
        
        println "--- Searching for GuiGraphics ---"
        cl.each { file ->
            if (file.name.endsWith('.jar')) {
                def zf = new java.util.zip.ZipFile(file)
                zf.entries().each { e ->
                    def name = e.name
                    if (name.contains('GuiGraphics') || name.contains('DrawContext')) {
                        println name
                    }
                    if (name.contains('ClickType') || name.contains('SlotClickType')) {
                        println name
                    }
                }
            }
        }
        
        println "--- Methods in LocalPlayer ---"
        try {
            def clazz = ucl.loadClass('net.minecraft.client.player.LocalPlayer')
            clazz.getMethods().each { m ->
                if (m.name.toLowerCase().contains('message') || m.name.toLowerCase().contains('chat')) {
                    println m.name + " : " + m.getParameterTypes().collect { it.name }
                }
            }
        } catch (Exception e) {}
    }
}
tasks.register('dumpAPI') {
    doLast {
        def cl = sourceSets.main.compileClasspath
        def j25 = javaToolchains.launcherFor { languageVersion = JavaLanguageVersion.of(25) }.get().executablePath
        
        def classpath = cl.collect { it.getAbsolutePath() }.join(File.pathSeparator)
        def script = new File('DumpAPI.java')
        script.text = '''
import java.lang.reflect.*;

public class DumpAPI {
    public static void main(String[] args) throws Exception {
        dump("net.minecraft.client.gui.screens.Screen");
        dump("net.minecraft.world.entity.player.Player");
        dump("net.minecraft.client.player.LocalPlayer");
        dump("net.minecraft.client.gui.screens.inventory.AbstractContainerScreen");
        dump("net.minecraft.client.Minecraft");
    }
    static void dump(String name) {
        System.out.println("--- " + name + " ---");
        try {
            Class<?> c = Class.forName(name);
            for(Method m : c.getMethods()) {
                if (m.getName().toLowerCase().contains("message") || 
                    m.getName().toLowerCase().contains("chat") || 
                    m.getName().toLowerCase().contains("render") ||
                    m.getName().toLowerCase().contains("click")) {
                    
                    System.out.print(m.getName() + "(");
                    Class<?>[] pTypes = m.getParameterTypes();
                    for(int i=0;i<pTypes.length;i++) {
                        System.out.print(pTypes[i].getSimpleName() + (i<pTypes.length-1?", ":""));
                    }
                    System.out.println(")");
                }
            }
        } catch(Exception e) {
            System.out.println("Not found");
        }
    }
}
'''
        exec {
            commandLine j25, '-cp', classpath + File.pathSeparator + '.', 'DumpAPI.java'
        }
    }
}
tasks.register('javapClasses') {
