tasks.register('findClickType') {
    doLast {
        def cl = sourceSets.main.compileClasspath
        cl.each { file ->
            if (file.name.endsWith('.jar')) {
                def zf = new java.util.zip.ZipFile(file)
                zf.entries().each { e ->
                    def name = e.name
                    if (name.contains('net/minecraft/world/inventory') && name.contains('Click')) {
                        println name
                    }
                }
            }
        }
    }
}
