        def j25 = javaToolchains.launcherFor { languageVersion = JavaLanguageVersion.of(25) }.get().executablePath
        def javap = j25.replace('java.exe', 'javap.exe')
        
        println '--- Screen ---'
        exec { commandLine javap, '-cp', classpath, '-public', 'net.minecraft.client.gui.screens.Screen' }
        println '--- LocalPlayer ---'
        exec { commandLine javap, '-cp', classpath, '-public', 'net.minecraft.client.player.LocalPlayer' }
        println '--- AbstractContainerScreen ---'
        exec { commandLine javap, '-cp', classpath, '-public', 'net.minecraft.client.gui.screens.inventory.AbstractContainerScreen' }
        println '--- ClickType ---'
        exec { commandLine javap, '-cp', classpath, '-public', 'net.minecraft.world.inventory.ClickType' ; ignoreExitValue true }
    }
}
